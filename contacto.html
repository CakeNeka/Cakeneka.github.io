<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            max-width: 960px;
            margin: auto;
            font-family: Verdana;
            background-color: rgb(255, 222, 211);
        }

        header {
            color: rgb(255, 222, 211);
            text-align: center;
            background-image: url(./img/background.png);
            height: 300px;
            font-variant: small-caps;
        }

        nav {
            height: 50px;
            background-color: rgb(0, 0, 0);
            color: white;
            top: 350px;
            align-items: center;
            justify-content: center;
        }

        nav ul {
            list-style-type: none;
        }

        nav li {
            display: inline-block;
            margin: 0px;
        }

        li a {
            display: block;
            text-decoration: none;
            padding: 15px;
            color: white;
        }

        li a:hover {
            background-color: rgb(26, 26, 26);
        }

        footer {
            background-color: darkgray;
            color: white;
            height: 150px;
            text-align: center;
            padding-top: 10px;
        }

        section {
            padding: 20px;
            background-color: lightgray;
        }

        article {
            margin: 10px;
        }

        form fieldset {
            padding: 15px;
            margin: 10px;
        }
    </style>

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Club de Fans de Melendi</title>
    <link rel="icon" type="image/x-icon" href="./img/favicon.png">
</head>

<body>
    <header>
        <h1>Club de Fans de Baldur's Gate II</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="galeria.html">Galería</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <!--Aquí debe haber un formulario-->
            <li><a href="ubicacion.html">Donde estamos</a></li>
            <!--Aquí ubicación-->
        </ul>
    </nav>

    <section>
        <h2>Contacta con Nosotros</h2>
        <article>
            <form action="">
                <fieldset>
                    <legend>Datos personales</legend>
                    <label for="nombre">Nombre Completo: &nbsp;</label>
                    <input type="text" id="nombre" name="nombre" size="50"><br>
                    <br>
                    <label for="correo">Correo Electrónico: &nbsp;</label>
                    <input type="text" id="correo" name="correo" size="50">
                </fieldset>
                <fieldset>
                    <legend>Motivo del contacto</legend>
                    <label for="Seleccione una opción"></label>

                    <input type="radio" id="unirme" name="best_game" value="unirme" />
                    <label for="unirme">Quiero unirme al club de fans</label> <br>
                    <input type="radio" id="comentario" name="best_game" value="comentario" />
                    <label for="comentario">Quiero aportar un comentario</label> <br>
                    <input type="radio" id="mejorar" name="best_game" value="mejorar" />
                    <label for="mejorar">Quiero mejorar la página web</label> <br>
                    <input type="radio" id="otro" name="best_game" value="otro" />
                    <label for="otro">Otro</label> <br>
                </fieldset>
                <fieldset>
                    <label for="mensaje">Mensaje: </label> <br>
                    <textarea name="mensaje" id="mensaje" cols="60" rows="10"></textarea>
                </fieldset>
                <input type="submit" value="Enviar" size="40" style="height: 30px; width: 100px;">
            </form>
        </article>
    </section>

    <footer>
        <div style="
          width: 300px;
          height: 100px;
          float: left;
        ">
            <h4>Redes sociales</h4>
            <br>
            <a href="https://www.instagram.com/" target="_blank"><img src="./img/instagram-ico.png" alt="instagram icon"
                    height="35" width="35" /></a>
            <a href="https://twitter.com/" target="_blank"><img src="./img/Twitter.png" alt="twitter icon" height="35"
                    width="35" /></a><br>
            <a href="https://yotube.com/" target="_blank"><img src="./img/yotube.png" alt="yotube icon" height="35"
                    width="35" /></a>
            <a href="https://github.com/cakeneka" target="_blank"><img src="./img/github.png" alt="github icons" height="35"
                    width="35" /></a>
        </div>
        <div style="
          width: 357px;
          height: 100px;
          float: left;
        ">
            <h4>Contacta</h4>
            <br>
            <p><img src="./img/mail-icon.png" alt="mail icon" height="15" width="25" style="left: 50px;">
                Clubdefai@gmail.com</p>
            <br>
            <p><img src="./img/phone_icon.png" alt="phone_icon" height="20" width="20" style="left: 50px;">
                +34 235234135</p>
        </div>
        <div style="
          width: 300px;
          height: 100px;
          float: left;
        ">
            <h4>Otros enlaces</h4>
        </div>
    </footer>
</body>

</html>
